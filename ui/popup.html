<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <title>Configurações Mestre</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-top: #1A365D;
      --bg-gradient-bottom: #4299E1;
      --text-main: #1f2937;
      --primary: #2926c8;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, var(--bg-gradient-top) 0%, var(--bg-gradient-bottom) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #ffffff;
      border-radius: 12px;
      padding: 24px;
      margin: 20px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    img.logo {
      max-width: 180px;
      margin-bottom: 20px;
    }

    /* Toggle Switch */
    .settings-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
      margin-bottom: 15px;
    }

    .settings-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-main);
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: var(--primary);
    }

    input:checked+.slider:before {
      transform: translateX(20px);
    }

    p.desc {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.4;
      margin-bottom: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="../assets/icons/logoheader.webp" alt="Bezura Logo" class="logo">

    <div class="settings-container">
      <label class="toggle-switch">
        <input type="checkbox" id="masterToggle" checked>
        <span class="slider"></span>
      </label>
      <span class="settings-label">Notificações Ativas</span>
    </div>

    <p class="desc">Desligue para silenciar completamente os alertas de novos Leads nesta extensão.</p>
    
    <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 20px 0;">

    <div class="settings-container">
      <label class="toggle-switch">
        <input type="checkbox" id="themeToggle" checked>
        <span class="slider"></span>
      </label>
      <span class="settings-label">Tema Personalizado</span>
    </div>

    <p class="desc">Ativa um visual azul claro com efeitos "neon" na interface do Bezura.</p>
  </div>
  
  <script src="../scripts/popup.js"></script>
</body>

</html>
